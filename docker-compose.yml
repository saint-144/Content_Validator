services:
  mysql:
    image: mysql:8.0
    container_name: cv_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Validator@2024
      MYSQL_DATABASE: content_validator
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pValidator@2024"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:Validator%402024@mysql:3306/content_validator
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-mistralai/mistral-large-3-675b-instruct-2512}
      - UPLOAD_DIR=/app/uploads
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://frontend:3000"]}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  django_auth:
    build:
      context: ./django_auth
      dockerfile: Dockerfile
    container_name: cv_django_auth
    restart: always
    ports:
      - "8001:8001"
    environment:
      - MYSQL_DATABASE=content_validator
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DJANGO_DEBUG=True
      - ADMIN_USERNAME=${ADMIN_USERNAME:-ADMIN}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ADMIN}
      - APP_ADMIN_USERNAME=${APP_ADMIN_USERNAME:-admin}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD:-admin}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cv_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_AUTH_URL=http://localhost:8001
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    container_name: cv_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
